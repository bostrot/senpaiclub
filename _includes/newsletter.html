  Newsletter
{% endcomment %}

<div class="newsletter-panel">
    <div class="panel-heading">Newsletter</div>
    <div class="newsletter-body d-flex flex-wrap mb-1">
        <div id="mc_embed_signup" class="w-100 newsletter-signup">
            <form
                action="https://club.us21.list-manage.com/subscribe/post?u=738fc47653d1c9100e0ed1ad7&amp;id=633fdaceaa&amp;f_id=00f0a8e1f0"
                method="post"
                id="mc-embedded-subscribe-form"
                name="mc-embedded-subscribe-form"
                class="validate newsletter-form"
                target="_self"
            >
                <div id="mc_embed_signup_scroll">
                    <input
                        type="email"
                        value=""
                        name="EMAIL"
                        class="form-control required email newsletter-email"
                        id="mce-EMAIL"
                        placeholder="your@email.com"
                        required
                    >
                    <span id="mce-EMAIL-HELPERTEXT" class="helper_text"></span>

                    <div id="mce-responses" class="clear foot">

                        <div class="response" id="mce-success-response" style="display:none"></div>
                    </div>

                    <div style="position: absolute; left: -5000px;" aria-hidden="true">
                        <input type="text" name="b_738fc47653d1c9100e0ed1ad7_633fdaceaa" tabindex="-1" value="">
                    </div>

                    <div class="newsletter-actions mt-2 text-end">
                        <input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe" class="post-tag newsletter-submit">
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
